<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/x-icon" href="icons/favicon.ico">
  <link rel="icon" type="image/png" sizes="96x96" href="icons/favicon-96x96.png">
  <link rel="icon" type="image/svg+xml" href="icons/favicon.svg">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="manifest" href="icons/site.webmanifest">
  <title>Screenshot Saver</title>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📸 Screenshot Saver</h1>
      <button id="floatingBtn" class="floating-btn" title="Toggle options">⚙️</button>
    </div>

    <div id="optionsPanel" class="options-panel">
      <div class="form-group">
        <label for="countrySearch">🌍 Country</label>
        <div class="search-dropdown-wrapper">
          <input type="text" id="countrySearch" placeholder="Search country..." class="search-input">
          <ul id="countryDropdown" class="dropdown-list"></ul>
        </div>
      </div>

      <div class="form-group">
        <label for="attributeSearch">🏷️ Attribute</label>
        <div class="search-dropdown-wrapper">
          <input type="text" id="attributeSearch" placeholder="Search attribute..." class="search-input">
          <ul id="attributeDropdown" class="dropdown-list"></ul>
        </div>
      </div>

      <button id="captureBtn" class="capture-btn">
        <span>Capture & Save</span>
      </button>

      <div id="status" class="status"></div>

      <div class="info-footer">
        <small>Saves to: Downloads/VIF_screenshots/[Country]/[Date]/[Attribute]/</small>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
